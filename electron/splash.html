<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
  display: flex; align-items: center; justify-content: center;
  height: 100vh; font-family: 'Segoe UI', Arial, sans-serif;
  overflow: hidden; user-select: none;
}
.splash {
  text-align: center;
  animation: fadeIn 0.8s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
.logo {
  width: 100px; height: 100px; margin: 0 auto 24px;
  background: rgba(255,255,255,0.08);
  border-radius: 28px; display: flex; align-items: center; justify-content: center;
  position: relative;
}
.logo svg { width: 56px; height: 56px; }
.logo-ring {
  position: absolute; inset: -3px;
  border-radius: 28px;
  border: 2px solid transparent;
  border-top-color: #3b82f6;
  border-right-color: #60a5fa;
  animation: spin 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
h1 {
  font-size: 22px; font-weight: 600; color: #f1f5f9;
  letter-spacing: 0.5px; margin-bottom: 6px;
}
.sub {
  font-size: 13px; color: #94a3b8;
  margin-bottom: 28px; letter-spacing: 2px; text-transform: uppercase;
}
.loading-bar {
  width: 220px; height: 3px; background: rgba(255,255,255,0.08);
  border-radius: 4px; margin: 0 auto; overflow: hidden;
}
.loading-bar-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #3b82f6, #60a5fa);
  border-radius: 4px;
  animation: load 2s ease-in-out infinite;
}
@keyframes load {
  0% { width: 0%; margin-left: 0; }
  50% { width: 60%; margin-left: 20%; }
  100% { width: 0%; margin-left: 100%; }
}
.version {
  margin-top: 32px; font-size: 11px; color: #475569;
}
.status {
  margin-top: 12px; font-size: 12px; color: #64748b;
  min-height: 18px;
}
</style>
</head>
<body>
<div class="splash">
  <div class="logo">
    <div class="logo-ring"></div>
    <svg viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="14" rx="2"/>
      <line x1="8" y1="21" x2="16" y2="21"/>
      <line x1="12" y1="17" x2="12" y2="21"/>
      <path d="M6 10l4 4 6-6" stroke-width="2"/>
    </svg>
  </div>
  <h1>Virtual kassa</h1>
  <div class="sub">POS Terminal</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  <div class="status" id="status">Загрузка...</div>
  <div class="version">v1.0.0</div>
</div>
<script>
const el = document.getElementById('status');
const messages = ['Подключение к базе данных...', 'Запуск сервера...', 'Загрузка приложения...'];
let i = 0;
setInterval(() => {
  el.textContent = messages[i % messages.length];
  i++;
}, 1200);
</script>
</body>
</html>
